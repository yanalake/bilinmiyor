<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Makinesi | Anasayfa</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-overlay: rgba(10, 10, 15, 0.9);
            --note-paper: #f4f1ea;
            --transition-speed: 0.6s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('https://raw.githubusercontent.com/yanalake/bilinmiyor/main/arkaplan.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Fredoka One', cursive;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Karanlık Pixar Atmosferi */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, var(--dark-overlay) 90%);
            z-index: -1;
        }

        /* Navigasyon Menüsü - Görsel Hiyerarşi */
        nav {
            width: 100%;
            padding: 30px 50px;
            display: flex;
            align-items: center;
            gap: 40px; /* Butonlar arası boşluk */
            z-index: 100;
        }

        .nav-link {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
            display: flex;
            align-items: center;
        }

        /* Boyut Hiyerarşisi */
        .btn-home { width: 90px; } /* En küçük */
        .btn-cinema { width: 140px; } /* Daha büyük ve vurgulu */

        .nav-link:hover {
            transform: scale(1.1) rotate(2deg);
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.6));
        }

        /* Sayfa Geçiş Animasyonu (Slide-in) */
        .content-wrapper {
            animation: slideIn 0.8s ease-out forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Dogma 95 Notu */
        .manifesto-note {
            margin-top: 40px;
            background-color: var(--note-paper);
            color: #222;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            border-radius: 4px;
            box-shadow: 15px 15px 50px rgba(0,0,0,0.8);
            font-family: 'Special Elite', typewriter;
            position: relative;
            transform: rotate(-1deg);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            border-bottom: 2px dashed #bbb;
            text-align: center;
        }

        .rules { list-style: none; line-height: 1.6; }
        .rules li::before { content: "× "; color: #8b0000; font-weight: bold; }

        .subtitle {
            margin-top: 30px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-link">
            <img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/anasayfabuton.png" alt="Anasayfa" class="btn-home">
        </a>
        <a href="sinema.html" class="nav-link">
            <img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/sinemabuton.png" alt="Sinema" class="btn-cinema">
        </a>
    </nav>

    <div class="content-wrapper">
        <div class="manifesto-note">
            <h1>DOGMA 95</h1>
            <ul class="rules">
                <li>Çekimler stüdyo dışında, gerçek mekanlarda yapılmalı.</li>
                <li>Ses ve görüntü asla birbirinden ayrı kaydedilmemeli.</li>
                <li>Kamera elde taşınmalı.</li>
                <li>Özel ışıklandırma kullanılmamalı.</li>
                <li>Optik numaralar ve filtreler yasaktır.</li>
                <li>Tür filmleri kabul edilemez.</li>
            </ul>
        </div>
        <div class="subtitle">İffet Yemini: Lars von Trier</div>
    </div>

</body>
</html>
