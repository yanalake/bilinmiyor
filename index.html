<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Makinesi | Sinema Arşivi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4af37;
            --note-bg: #f4f1ea;
            --glass-black: rgba(0, 0, 0, 0.75);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('https://raw.githubusercontent.com/yanalake/bilinmiyor/main/arkaplan.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier Prime', monospace;
            color: #fff;
            min-height: 100vh;
            padding: 20px 20px 250px 20px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, rgba(10, 10, 15, 0.98) 100%);
            z-index: -1;
        }

        /* YENİ: Estetik ve Belirgin Replik Alanı */
        #quote-container {
            max-width: 900px;
            margin: 30px auto 50px auto;
            perspective: 1000px;
        }

        .quote-box {
            background: var(--glass-black);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px 40px;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: rotateX(5deg);
        }

        #quote-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            font-style: italic;
            color: var(--accent);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        /* Not Grubu Konteynırı */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .note-card {
            background: var(--note-bg);
            color: #222;
            padding: 35px;
            font-family: 'Courier Prime', monospace;
            box-shadow: 15px 15px 45px rgba(0,0,0,0.8);
            border-radius: 4px;
            line-height: 1.7;
            position: relative;
            border-left: 6px solid #ccc;
            opacity: 0; /* Başta görünmez, JS ile gelecek */
            animation: cardFadeIn 0.8s ease-out forwards;
        }

        .note-card:hover { transform: scale(1.02) !important; z-index: 10; }

        .note-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 1px dashed #aaa;
            color: #000;
        }

        /* Navigasyon */
        nav {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 45px;
            z-index: 1000;
        }

        .nav-link, .music-toggle {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-img-large { width: 160px; height: auto; filter: drop-shadow(0 10px 25px rgba(0,0,0,0.7)); }
        .btn-img-small { width: 95px; height: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.7)); }

        .music-btn-container {
            width: 95px; height: 95px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--accent);
            color: var(--accent);
            font-size: 2.6rem;
            cursor: pointer;
        }

        .nav-link:hover, .music-toggle:hover { transform: translateY(-25px) scale(1.1); }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: var(--rotate-val); }
        }
    </style>
</head>
<body>

    <div id="quote-container">
        <div class="quote-box">
            <p id="quote-text">Zaman Makinesi Hazırlanıyor...</p>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/delosound-mysterious-mystical-ambient-442832.mp3" type="audio/mpeg">
    </audio>

    <div class="notes-grid" id="main-grid">
        </div>

    <nav>
        <a href="index.html" class="nav-link"><img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/anasayfabuton.png" class="btn-img-large"></a>
        <div id="music-trigger" class="music-toggle"><div class="music-btn-container"><span id="music-icon">▶</span></div></div>
        <a href="sinema.html" class="nav-link"><img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/sinemabuton.png" class="btn-img-large"></a>
        <a href="video.html" class="nav-link"><img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/tvbuton.png" class="btn-img-small"></a>
    </nav>

    <script src="liste.js"></script>

    <script>
        // 1. REPLİK SİSTEMİ
        const replikler = [
            "“Her şey bir rüya ile başlar.”",
            "“Sinema, hayatın pürüzleri ayıklanmış halidir.”",
            "“Gelecek, onu bugünden hazırlayanlara aittir.”",
            "“Bütün filmler aslında birer zaman makinesidir.”",
            "“Işık varsa, umut da vardır.”"
        ];

        function replikGuncelle() {
            const qText = document.getElementById('quote-text');
            const secilen = replikler[Math.floor(Math.random() * replikler.length)];
            qText.style.opacity = 0;
            setTimeout(() => {
                qText.innerText = secilen;
                qText.style.opacity = 1;
            }, 1000);
        }
        setInterval(replikGuncelle, 7000);
        replikGuncelle();

        // 2. MÜZİK KONTROLÜ
        const audio = document.getElementById('bg-music');
        const trigger = document.getElementById('music-trigger');
        const icon = document.getElementById('music-icon');
        trigger.addEventListener('click', () => {
            if (audio.paused) { audio.play(); icon.innerText = '⏸'; }
            else { audio.pause(); icon.innerText = '▶'; }
        });

        // 3. KRİTİK VERİ YÜKLEME MOTORU (ÇÖZÜM)
        const grid = document.getElementById('main-grid');
        let denemeSayisi = 0;

        function veriMotoru() {
            // liste.js içindeki 'sinemaNotlari' dizisini kontrol et
            if (typeof sinemaNotlari !== 'undefined' && Array.isArray(sinemaNotlari)) {
                grid.innerHTML = ''; 
                sinemaNotlari.forEach((not, i) => {
                    const kart = document.createElement('div');
                    kart.className = 'note-card';
                    const rot = (i % 2 === 0) ? -2 : 1.5;
                    kart.style.setProperty('--rotate-val', `rotate(${rot}deg)`);
                    kart.innerHTML = `<h2>${not.baslik}</h2><p>${not.icerik}</p>`;
                    grid.appendChild(kart);
                });
                console.log("Veriler başarıyla yüklendi.");
            } else {
                denemeSayisi++;
                if (denemeSayisi < 20) { // 2 saniye boyunca her 100ms'de bir dene
                    setTimeout(veriMotoru, 100);
                } else {
                    grid.innerHTML = "<p style='color:var(--accent); text-align:center; grid-column:1/-1;'>Veri dosyası (liste.js) bulunamadı veya hatalı.</p>";
                }
            }
        }

        // Sayfa tamamen yüklendiğinde motoru başlat
        window.addEventListener('load', veriMotoru);
    </script>
</body>
</html>
