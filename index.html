<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Makinesi | Anasayfa</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #0a0a0f;
            --note-paper: #f4f1ea;
            --accent: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('https://raw.githubusercontent.com/yanalake/bilinmiyor/main/arkaplan.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Fredoka One', cursive;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Alt menü yüksekliği kadar boşluk bırakıyoruz ki içerik kapanmasın */
            padding-bottom: 150px; 
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(10, 10, 15, 0.9) 90%);
            z-index: -1;
        }

        /* Sabit Alt Navigasyon */
        nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 50px;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-link {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Buton Boyutları Eşitlendi ve Büyütüldü */
        .btn-img {
            width: 120px; /* Her iki buton için de aynı boyut */
            height: auto;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .nav-link:hover {
            transform: scale(1.15) translateY(-10px);
            filter: drop-shadow(0 0 15px var(--accent));
        }

        /* İçerik Alanı */
        .content-wrapper {
            animation: slideIn 0.8s ease-out;
            margin-top: 80px;
            width: 90%;
            max-width: 700px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .manifesto-note {
            background-color: var(--note-paper);
            color: #222;
            padding: 45px;
            border-radius: 2px;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.9);
            font-family: 'Special Elite', typewriter;
            transform: rotate(-0.5deg);
        }

        h1 { text-align: center; margin-bottom: 25px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
        .rules { list-style: none; line-height: 1.8; font-size: 1.1rem; }
        .rules li::before { content: "• "; color: #8b0000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <div class="manifesto-note">
            <h1>DOGMA 95</h1>
            <ul class="rules">
                <li>Çekimler stüdyo dışında, gerçek mekanlarda yapılmalı.</li>
                <li>Ses ve görüntü asla birbirinden ayrı kaydedilmemeli.</li>
                <li>Kamera elde taşınmalı.</li>
                <li>Özel ışıklandırma kullanılmamalı.</li>
                <li>Optik numaralar ve filtreler yasaktır.</li>
                <li>Tür filmleri kabul edilemez.</li>
            </ul>
        </div>
    </div>

    <nav>
        <a href="index.html" class="nav-link">
            <img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/anasayfabuton.png" alt="Anasayfa" class="btn-img">
        </a>
        <a href="sinema.html" class="nav-link">
            <img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/sinemabuton.png" alt="Sinema" class="btn-img">
        </a>
    </nav>

</body>
</html>
