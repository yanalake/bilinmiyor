<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Makinesi | Sinema Arşivi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4af37;
            --note-bg: #f4f1ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('https://raw.githubusercontent.com/yanalake/bilinmiyor/main/arkaplan.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier Prime', monospace;
            color: #fff;
            min-height: 100vh;
            padding: 20px 20px 250px 20px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, rgba(10, 10, 15, 0.98) 100%);
            z-index: -1;
        }

        /* Estetik Replik Alanı */
        #quote-area {
            max-width: 800px;
            margin: 40px auto 60px auto;
            text-align: center;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #quote-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            font-style: italic;
            color: var(--accent);
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            /* YENİ: Repliklere Gölge Eklendi */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8), 0 0 20px rgba(212, 175, 55, 0.5);
        }

        /* Not Grubu Konteynırı */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .note-card {
            background: var(--note-bg);
            color: #222;
            padding: 30px;
            font-family: 'Courier Prime', monospace;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.7);
            border-radius: 3px;
            line-height: 1.6;
            transition: transform 0.4s ease;
            position: relative;
            border-left: 5px solid #ddd;
            animation: fadeIn 1s ease-out forwards;
        }

        .note-card:hover {
            transform: scale(1.03) rotate(0deg) !important;
            z-index: 10;
        }

        .note-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-bottom: 1px dashed #999;
            color: #111;
        }

        /* Navigasyon */
        nav {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 1000;
        }

        .nav-link, .music-toggle {
            text-decoration: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-img-large { width: 150px; height: auto; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6)); }
        .btn-img-small { width: 90px; height: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6)); }

        .music-btn-container {
            width: 90px; height: 90px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--accent);
            color: var(--accent);
            font-size: 2.5rem;
        }

        .nav-link:hover, .music-toggle:hover {
            transform: translateY(-20px) scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="quote-area">
        <p id="quote-text"></p>
    </div>

    <audio id="bg-music" loop>
        <source src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/delosound-mysterious-mystical-ambient-442832.mp3" type="audio/mpeg">
    </audio>

    <div class="notes-grid" id="main-grid">
        </div>

    <nav>
        <a href="index.html" class="nav-link">
            <img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/anasayfabuton.png" alt="Anasayfa" class="btn-img-large">
        </a>
        
        <div id="music-trigger" class="music-toggle">
            <div class="music-btn-container">
                <span id="music-icon">▶</span>
            </div>
        </div>

        <a href="sinema.html" class="nav-link">
            <img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/sinemabuton.png" alt="Sinema" class="btn-img-large">
        </a>

        <a href="video.html" class="nav-link">
            <img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/tvbuton.png" alt="Video" class="btn-img-small">
        </a>
    </nav>

    <script src="liste.js"></script>

    <script>
        // 1. REPLİK MOTORU
        const replikler = [
            "“Her şey bir rüya ile başlar.”",
            "“Gelecek, onu bugünden hazırlayanlara aittir.”",
            "“Sinema, hayatın pürüzlerini ayıklanmış halidir.”",
            "“Gerçeklik sadece bir illüzyondur, ancak çok inatçı bir tanesi.”",
            "“Bütün filmler aslında birer zaman makinesidir.”"
        ];

        function replikDegistir() {
            const qText = document.getElementById('quote-text');
            const rastgele = replikler[Math.floor(Math.random() * replikler.length)];
            qText.style.opacity = 0;
            setTimeout(() => {
                qText.innerText = rastgele;
                qText.style.opacity = 1;
            }, 1500);
        }
        setInterval(replikDegistir, 6000);
        replikDegistir();

        // 2. MÜZİK KONTROLÜ
        const audio = document.getElementById('bg-music');
        const trigger = document.getElementById('music-trigger');
        const icon = document.getElementById('music-icon');

        trigger.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                icon.innerText = '⏸';
            } else {
                audio.pause();
                icon.innerText = '▶';
            }
        });

        // 3. LİSTE (BLOG) MOTORU
        const grid = document.getElementById('main-grid');

        function notlariYukle() {
            grid.innerHTML = ''; 
            
            // liste.js içindeki 'sinemaNotlari' dizisini kontrol et
            if (typeof sinemaNotlari !== 'undefined' && Array.isArray(sinemaNotlari)) {
                sinemaNotlari.forEach((not, index) => {
                    const kart = document.createElement('div');
                    kart.className = 'note-card';
                    
                    // Rastgele eğim ver (Pixar stili dağınıklık)
                    const rotate = (index % 2 === 0) ? -2 : 1.5;
                    kart.style.transform = `rotate(${rotate}deg)`;
                    
                    kart.innerHTML = `
                        <h2>${not.baslik}</h2>
                        <p>${not.icerik}</p>
                    `;
                    grid.appendChild(kart);
                });
            } else {
                grid.innerHTML = "<p style='text-align:center; color:var(--accent); grid-column: 1/-1;'>Veriler yükleniyor veya liste.js bulunamadı...</p>";
                console.error("Hata: sinemaNotlari dizisi bulunamadı!");
            }
        }

        // Sayfa yüklendiğinde ve liste.js hazır olduğunda çalıştır
        window.addEventListener('DOMContentLoaded', notlariYukle);
        // Yedek tetikleyici (Dosya geç yüklenirse)
        setTimeout(notlariYukle, 500);
    </script>

</body>
</html>
