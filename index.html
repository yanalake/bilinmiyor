<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Makinesi | Sinema Arşivi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4af37;
            --note-bg: #f4f1ea;
            --glass-black: rgba(0, 0, 0, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('https://raw.githubusercontent.com/yanalake/bilinmiyor/main/arkaplan.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier Prime', monospace;
            color: #fff;
            min-height: 100vh;
            padding: 20px 20px 250px 20px;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, rgba(10, 10, 15, 0.98) 100%);
            z-index: -1;
        }

        #quote-container {
            max-width: 900px;
            margin: 30px auto 50px auto;
            perspective: 1000px;
        }

        .quote-box {
            background: var(--glass-black);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 45px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.4);
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        #quote-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            font-style: italic;
            color: var(--accent);
            text-shadow: 3px 3px 15px rgba(0,0,0,0.9);
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .note-card {
            background: var(--note-bg);
            color: #222;
            padding: 35px;
            font-family: 'Courier Prime', monospace;
            box-shadow: 15px 15px 45px rgba(0,0,0,0.8);
            border-radius: 4px;
            line-height: 1.7;
            border-left: 6px solid #ccc;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(40px);
            animation: slideInUp 0.8s ease forwards;
        }

        .note-card:hover { 
            transform: scale(1.03) translateY(-10px) rotate(0deg) !important; 
            z-index: 10;
            box-shadow: 20px 20px 50px rgba(0,0,0,0.9);
            border-left-color: var(--accent);
        }

        .note-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #aaa;
            color: #000;
        }

        .note-content {
            font-size: 0.95rem;
            color: #444;
        }

        nav {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 30px; z-index: 1000;
        }
        .btn-img-large { width: 140px; height: auto; transition: 0.4s; filter: drop-shadow(0 10px 25px rgba(0,0,0,0.7)); }
        .btn-img-small { width: 85px; height: auto; transition: 0.4s; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.7)); }
        
        .music-btn-container {
            width: 85px; height: 85px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; border: 2px solid var(--accent);
            color: var(--accent); font-size: 2.2rem; cursor: pointer;
            transition: all 0.4s ease;
        }
        
        .nav-link:hover .btn-img-large, .nav-link:hover .btn-img-small, .music-toggle:hover .music-btn-container { 
            transform: translateY(-15px) scale(1.1); 
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobil Optimizasyon */
        @media (max-width: 768px) {
            #quote-text { font-size: 1rem; }
            .quote-box { padding: 20px; }
            nav { gap: 15px; bottom: 20px; }
            .btn-img-large { width: 90px; }
            .btn-img-small, .music-btn-container { width: 60px; height: 60px; font-size: 1.5rem; }
            .notes-grid { gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="quote-container">
        <div class="quote-box">
            <p id="quote-text"></p>
        </div>
    </div>

    <audio id="bg-music" loop><source src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/delosound-mysterious-mystical-ambient-442832.mp3" type="audio/mpeg"></audio>

    <div class="notes-grid" id="feed-grid">
        <p style="text-align:center; grid-column: 1/-1; color: var(--accent);">Zaman Makinesi Verileri Çekiyor...</p>
    </div>

    <nav>
        <a href="index.html" class="nav-link"><img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/anasayfabuton.png" class="btn-img-large"></a>
        <div id="music-trigger" class="music-toggle"><div class="music-btn-container"><span id="music-icon">▶</span></div></div>
        <a href="sinema.html" class="nav-link"><img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/sinemabuton.png" class="btn-img-large"></a>
        <a href="video.html" class="nav-link"><img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/tvbuton.png" class="btn-img-small"></a>
    </nav>

    <script src="liste.js"></script>
    <script>
        // 1. GERÇEK RANDOM REPLİK MOTORU
        const replikler = [
            "“Her şey bir rüya ile başlar.”",
            "“Sinema, hayatın pürüzleri ayıklanmış halidir.”",
            "“Gelecek, onu bugünden hazırlayanlara aittir.”",
            "“Bütün filmler aslında birer zaman makinesidir.”",
            "“Işık varsa, umut da vardır.”",
            "“Gerçeklik sadece bir illüzyondur.”",
            "“Kamera bir silah, kurgu ise mermidir.”"
        ];

        let sonIndis = -1;

        function replikGetir() {
            const qText = document.getElementById('quote-text');
            let yeniIndis;
            do { yeniIndis = Math.floor(Math.random() * replikler.length); } while (yeniIndis === sonIndis);
            sonIndis = yeniIndis;
            
            qText.style.opacity = 0;
            setTimeout(() => {
                qText.innerText = replikler[yeniIndis];
                qText.style.opacity = 1;
            }, 1000);
        }

        window.addEventListener('DOMContentLoaded', replikGetir);
        setInterval(replikGetir, 8000);

        // 2. MÜZİK KONTROLÜ
        const audio = document.getElementById('bg-music');
        const trigger = document.getElementById('music-trigger');
        trigger.addEventListener('click', () => {
            if (audio.paused) { audio.play(); document.getElementById('music-icon').innerText = '⏸'; }
            else { audio.pause(); document.getElementById('music-icon').innerText = '▶'; }
        });

        // 3. HTML ETİKETLERİNİ TEMİZLEME FONKSİYONU (Kritik Çözüm)
        function stripHTML(htmlString) {
            const tempDiv = document.createElement("div");
            tempDiv.innerHTML = htmlString;
            return tempDiv.textContent || tempDiv.innerText || "";
        }

        // 4. FEED ÇEKME MOTORU
        const FEED_URL = 'https://letterboxd.com/yanalake/rss/'; 
        const grid = document.getElementById('feed-grid');

        async function feedYukle() {
            try {
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(FEED_URL)}`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    grid.innerHTML = '';
                    data.items.forEach((item, i) => {
                        // Letterboxd açıklamasını HTML etiketlerinden temizle
                        const cleanText = stripHTML(item.description).trim();
                        // Temizlenmiş metni kısalt
                        const shortText = cleanText.length > 150 ? cleanText.substring(0, 150) + '...' : cleanText;
                        
                        const card = document.createElement('a');
                        card.href = item.link;
                        card.target = '_blank';
                        card.className = 'note-card';
                        
                        // Hafif rotasyon efekti
                        const rot = (i % 2 === 0) ? -1 : 1;
                        card.style.transform = `rotate(${rot}deg) translateY(40px)`;
                        card.style.animationDelay = `${i * 0.1}s`; // Sırayla yüklenme efekti
                        
                        card.innerHTML = `
                            <h2>${item.title}</h2>
                            <div class="note-content">${shortText || "İnceleme metni bulunmuyor..."}</div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (e) { 
                console.error("Feed hatası:", e);
                // API çökerse liste.js'deki yerel verileri yedek olarak yükle
                grid.innerHTML = '';
                if(typeof sinemaNotlari !== 'undefined') {
                    sinemaNotlari.forEach((not, i) => {
                        const card = document.createElement('div');
                        card.className = 'note-card';
                        card.style.animationDelay = `${i * 0.1}s`;
                        card.innerHTML = `<h2>${not.baslik}</h2><div class="note-content">${not.icerik}</div>`;
                        grid.appendChild(card);
                    });
                }
            }
        }
        window.onload = feedYukle;
    </script>
</body>
</html>
