<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Makinesi | Sinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        /* CSS index.html ile tutarlı tutuldu */
        :root { --accent: #d4af37; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('https://raw.githubusercontent.com/yanalake/bilinmiyor/main/arkaplan.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Fredoka One', cursive;
            color: #fff;
            min-height: 100vh;
            padding-bottom: 150px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.93);
            z-index: -1;
        }

        /* Sabit Alt Navigasyon */
        nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 50px;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .btn-img { width: 120px; transition: 0.3s; }
        
        /* Aktif sayfa efekti için sinema butonunu parlatalım */
        .btn-cinema { filter: drop-shadow(0 0 10px var(--accent)); }
        .btn-home { opacity: 0.6; }
        
        .nav-link:hover .btn-img { opacity: 1; transform: scale(1.1); }

        /* İçerik */
        .cinema-container {
            animation: slideIn 0.8s ease-out;
            max-width: 1000px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .film-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            transition: 0.5s;
        }

        .film-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .poster-placeholder {
            width: 100%;
            height: 350px;
            background: #111;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        h2 { color: var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="cinema-container">
        <div class="film-card">
            <div class="poster-placeholder">LENS TESTİ</div>
            <h2>A7SIII Denemeleri</h2>
            <p>10-bit S-Log3 kayıtların renk süreci.</p>
        </div>
        <div class="film-card">
            <div class="poster-placeholder">FIRTINA</div>
            <h2>Gebze Sokakları</h2>
            <p>Düşük ışıkta noir atmosfer çalışması.</p>
        </div>
    </div>

    <nav>
        <a href="index.html" class="nav-link">
            <img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/anasayfabuton.png" alt="Anasayfa" class="btn-img btn-home">
        </a>
        <a href="sinema.html" class="nav-link">
            <img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/sinemabuton.png" alt="Sinema" class="btn-img btn-cinema">
        </a>
    </nav>

</body>
</html>
