<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Makinesi | Video Arşivi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent: #d4af37; 
            --bg-dark: #0a0a0f;
            --text-color: #e0e0e0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: url('https://raw.githubusercontent.com/yanalake/bilinmiyor/main/arkaplan.png') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier Prime', monospace;
            color: var(--text-color);
            min-height: 100vh;
            padding: 50px 20px 250px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.95); z-index: -1;
        }

        h1 {
            font-family: 'Montserrat', sans-serif; font-size: 3rem;
            color: var(--accent); letter-spacing: 5px; margin-bottom: 40px;
            text-align: center; text-transform: uppercase;
        }

        .video-container {
            width: 100%; max-width: 1000px; display: grid;
            grid-template-columns: 1fr; gap: 50px; animation: fadeIn 1s ease-out;
        }

        .video-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            transition: transform 0.3s ease;
        }

        .video-card:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.05); }

        .responsive-iframe {
            position: relative; overflow: hidden; width: 100%;
            padding-top: 56.25%; border-radius: 12px;
        }

        .responsive-iframe iframe {
            position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            width: 100%; height: 100%; border: none;
        }

        .video-info { margin-top: 20px; font-family: 'Courier Prime', monospace; }
        .video-info h3 { color: var(--accent); margin-bottom: 10px; font-family: 'Montserrat', sans-serif;}

        nav {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 30px; z-index: 1000;
        }
        .btn-large { width: 140px; height: auto; transition: 0.4s; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6)); }
        .btn-small { width: 85px; height: auto; transition: 0.4s; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6)); }
        .btn-tv { border-bottom: 4px solid var(--accent); padding-bottom: 5px; }
        .btn-faded { opacity: 0.7; }

        .music-circle {
            width: 85px; height: 85px; background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; border: 2px solid var(--accent);
            color: var(--accent); font-size: 2.2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: 0.4s; cursor: pointer;
        }

        .nav-link:hover .btn-large, .nav-link:hover .btn-small, .music-toggle:hover .music-circle {
            transform: translateY(-15px) scale(1.1); opacity: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            nav { gap: 15px; bottom: 20px; }
            .btn-large { width: 90px; }
            .btn-small, .music-circle { width: 60px; height: 60px; font-size: 1.5rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/delosound-mysterious-mystical-ambient-442832.mp3" type="audio/mpeg">
    </audio>

    <h1>VİDEO ARŞİVİ</h1>

    <div class="video-container">
        <div class="video-card">
            <div class="responsive-iframe">
                <iframe src="https://www.youtube.com/embed/i43WNXnlGMs" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <h3>SİNEMATİK ATMOSFER</h3>
                <p>Zamanın ve mekanın ötesinde bir görsel yolculuk.</p>
            </div>
        </div>
    </div>

    <nav>
        <a href="index.html" class="nav-link"><img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/anasayfabuton.png" alt="Anasayfa" class="btn-large btn-faded"></a>
        <div id="music-trigger" class="music-toggle"><div class="music-circle"><span id="music-icon">▶</span></div></div>
        <a href="sinema.html" class="nav-link"><img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/sinemabuton.png" alt="Sinema" class="btn-large btn-faded"></a>
        <a href="video.html" class="nav-link"><img src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/tvbuton.png" alt="Video" class="btn-small btn-tv"></a>
    </nav>

    <script>
        const audio = document.getElementById('bg-music');
        const trigger = document.getElementById('music-trigger');
        const icon = document.getElementById('music-icon');

        trigger.addEventListener('click', () => {
            if (audio.paused) { audio.play(); icon.innerText = '⏸'; } 
            else { audio.pause(); icon.innerText = '▶'; }
        });
    </script>

</body>
</html>
