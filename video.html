<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaman Makinesi | Video Arşivi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #d4af37; --text-color: #e0e0e0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: url('https://raw.githubusercontent.com/yanalake/bilinmiyor/main/arkaplan.png') no-repeat center center fixed; background-size: cover; font-family: 'Courier Prime', monospace; color: var(--text-color); min-height: 100vh; padding: 50px 20px 200px 20px; display: flex; flex-direction: column; align-items: center; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 15, 0.95); z-index: -1; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 3rem; color: var(--accent); letter-spacing: 5px; margin-bottom: 40px; text-align: center; text-transform: uppercase; }
        .video-container { width: 100%; max-width: 1000px; display: grid; grid-template-columns: 1fr; gap: 50px; animation: fadeIn 1s ease-out; }
        .video-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); transition: transform 0.3s ease; }
        .video-card:hover { transform: scale(1.02); background: rgba(255, 255, 255, 0.05); }
        .responsive-iframe { position: relative; overflow: hidden; width: 100%; padding-top: 56.25%; border-radius: 12px; }
        .responsive-iframe iframe { position: absolute; top: 0; left: 0; bottom: 0; right: 0; width: 100%; height: 100%; border: none; }
        .video-info { margin-top: 20px; font-family: 'Courier Prime', monospace; }
        .video-info h3 { color: var(--accent); margin-bottom: 10px; font-family: 'Montserrat', sans-serif;}
        
        /* TİPOGRAFİK NAVİGASYON */
        nav { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 30px; z-index: 1000; width: 100%; max-width: 900px; padding: 0 15px; }
        .nav-item { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.3rem; color: #dcdcdc; text-decoration: none; text-transform: uppercase; letter-spacing: 3px; text-shadow: 4px 4px 15px #000, -2px -2px 10px #000, 0 0 25px rgba(0,0,0,0.9); transition: all 0.3s; cursor: pointer; border-bottom: 3px solid transparent; padding-bottom: 5px; }
        .nav-item:hover { color: var(--accent); transform: translateY(-8px); text-shadow: 4px 4px 15px #000, 0 0 20px var(--accent); }
        .nav-item.active { color: var(--accent); border-bottom-color: var(--accent); }
        .sound-toggle { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1rem; color: #888; letter-spacing: 2px; padding: 8px 20px; border: 2px dashed #555; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; text-shadow: 2px 2px 10px #000; background: rgba(0,0,0,0.4); }
        .sound-toggle:hover { color: var(--accent); border-color: var(--accent); transform: translateY(-5px); }
        .sound-toggle.playing { color: var(--accent); border-color: var(--accent); border-style: solid; background: rgba(212, 175, 55, 0.1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { nav { gap: 15px; bottom: 20px; } .nav-item { font-size: 0.95rem; letter-spacing: 1px; padding: 5px 8px; border-radius: 8px; background: rgba(0,0,0,0.5); } .sound-toggle { font-size: 0.8rem; padding: 5px 12px; width: 100%; text-align: center; max-width: 200px; margin-top: 5px;} h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <audio id="bg-music" loop><source src="https://raw.githubusercontent.com/yanalake/bilinmiyor/main/delosound-mysterious-mystical-ambient-442832.mp3" type="audio/mpeg"></audio>

    <h1>VİDEO ARŞİVİ</h1>

    <div class="video-container">
        <div class="video-card">
            <div class="responsive-iframe"><iframe src="https://www.youtube.com/embed/i43WNXnlGMs" allowfullscreen></iframe></div>
            <div class="video-info"><h3>SİNEMATİK ATMOSFER</h3><p>Zamanın ve mekanın ötesinde bir görsel yolculuk.</p></div>
        </div>
    </div>

    <nav>
        <a href="index.html" class="nav-item">BAŞLANGIÇ</a>
        <a href="music.html" class="nav-item">FREKANS</a>
        <div id="music-trigger" class="sound-toggle">SESİ AÇ</div>
        <a href="sinema.html" class="nav-item">SİNEMA</a>
        <a href="video.html" class="nav-item active">KAYITLAR</a>
    </nav>

    <script>
        const audio = document.getElementById('bg-music');
        const trigger = document.getElementById('music-trigger');
        trigger.addEventListener('click', () => {
            if (audio.paused) { audio.play(); trigger.innerText = 'SESİ KAPAT'; trigger.classList.add('playing'); } 
            else { audio.pause(); trigger.innerText = 'SESİ AÇ'; trigger.classList.remove('playing'); }
        });
    </script>
</body>
</html>
